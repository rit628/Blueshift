name: Image Build

on:
    push:
      branches: [main]
    schedule:
        - cron: 0 0 * * 0
          timezone: America/New_York
    workflow_dispatch:

jobs:
    check_dockerfiles:
      outputs:
        changed: ${{ steps.changes.outputs.dockerfiles }}
      runs-on: ubuntu-latest
      steps:
        -
          name: Checkout Repository
          uses: actions/checkout@v6

        - 
          name: Filter Paths
          uses: dorny/paths-filter@v4
          id: changes
          with:
            filters: |
              dockerfiles:
                - compose.yaml
                - .docker/builder/**
                - .github/workflows/image-build.yml
                - .env

    build_and_publish_base:
      needs: check_dockerfiles
      if: (needs.check_dockerfiles.outputs.changed == 'true') || (github.event_name != 'push')
      permissions:
        contents: read
        packages: write
      runs-on: ubuntu-latest
      steps:
        -
          name: Login to Github Package Registry
          uses: docker/login-action@v4
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

        -
          name: Checkout Repository
          uses: actions/checkout@v6

        -
          name: Set Platform
          run: echo "PLATFORM_TAG=base" >> ${GITHUB_ENV}

        -
          name: Build Image
          run: docker compose build builder
        
        -
          name: Publish Image
          run: docker compose push builder

    build_and_publish_image:
      needs: build_and_publish_base
      strategy:
        fail-fast: false
        matrix:
          platform: [linux64, rpi64, win64, osx64, wasm32]
      permissions:
          contents: read
          packages: write
      runs-on: ubuntu-latest
      steps:
          -
            name: Login to Github Package Registry
            uses: docker/login-action@v4
            with:
              registry: ghcr.io
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

          -
            name: Set up QEMU
            uses: docker/setup-qemu-action@v4

          -
            name: Set up Docker Buildx
            uses: docker/setup-buildx-action@v4

          -
            name: Checkout Repository
            uses: actions/checkout@v6

          -
            name: Set Platform
            run: echo "PLATFORM_TAG=${{ matrix.platform }}" >> ${GITHUB_ENV}

          -
            name: Build Image
            run: docker compose build builder
          
          -
            name: Publish Image
            run: docker compose push builder